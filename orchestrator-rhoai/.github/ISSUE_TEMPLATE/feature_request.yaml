name: Feature Request
description: Suggest a feature for orchestrator-rhoai
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature. Please fill out the form below.
  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: A clear and concise description of the problem or use case.
      placeholder: I'm always frustrated when...
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the solution you'd like.
      placeholder: A clear description of the proposed feature.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Any alternative solutions or features you've considered.
      placeholder: Describe any alternatives you've considered.
  - type: dropdown
    id: implementation-phase
    attributes:
      label: Implementation Phase
      description: Suggested implementation phase (if known).
      options:
        - Phase 0
        - Phase 1
        - Phase 2
        - Phase 3
        - Phase 4
        - Phase 5
        - Phase 6
        - Phase 7
  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
      description: Any other context about the feature request.
      placeholder: Add any other context or screenshots here.
