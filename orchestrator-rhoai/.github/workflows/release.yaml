name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      matrix:
        service:
          - name: gateway
            context: src/gateway
            file: src/gateway/Containerfile
          - name: retrieval
            context: src/retrieval
            file: src/retrieval/Containerfile
          - name: code-sandbox
            context: src/code_sandbox
            file: src/code_sandbox/Containerfile
    steps:
      - uses: actions/checkout@v4

      - name: Get release version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Install podman
        run: |
          sudo apt-get update
          sudo apt-get install -y podman

      - name: Log in to GitHub Container Registry
        uses: redhat-actions/podman-login@v1
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push release images
        run: |
          IMAGE="ghcr.io/${{ github.repository }}/${{ matrix.service.name }}"
          VERSION="${{ steps.version.outputs.VERSION }}"

          podman build -t "${IMAGE}:${VERSION}" -t "${IMAGE}:latest" \
            -f ${{ matrix.service.file }} ${{ matrix.service.context }}

          podman push "${IMAGE}:${VERSION}"
          podman push "${IMAGE}:latest"

  create-release:
    runs-on: ubuntu-latest
    needs: build-and-release
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate SBOM (placeholder)
        run: |
          echo "SBOM generation placeholder - integrate with syft/cosign or similar"
          mkdir -p sbom
          touch sbom/placeholder.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: sbom/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
