apiVersion: v1
kind: ConfigMap
metadata:
  name: model-mapping
  namespace: orchestrator-rhoai
  labels:
    app.kubernetes.io/name: model-mapping
    app.kubernetes.io/component: config
    app.kubernetes.io/part-of: orchestrator-rhoai
  annotations:
    description: >-
      Maps ToolOrchestra tool model names (from the paper's tools.json) to
      actual vLLM endpoints. Replace endpoints when deploying additional
      specialist models (e.g. Qwen2.5-Math-7B for answer-math-1).
data:
  mapping.json: |
    {
      "reasoner-1": {
        "model": "llama-32-3b-instruct",
        "endpoint": "http://llama-32-3b-instruct-predictor.my-first-model.svc.cluster.local:8080/v1",
        "role": "Strong reasoning and analysis"
      },
      "reasoner-2": {
        "model": "llama-32-3b-instruct",
        "endpoint": "http://llama-32-3b-instruct-predictor.my-first-model.svc.cluster.local:8080/v1",
        "role": "Moderate reasoning"
      },
      "reasoner-3": {
        "model": "llama-32-3b-instruct",
        "endpoint": "http://llama-32-3b-instruct-predictor.my-first-model.svc.cluster.local:8080/v1",
        "role": "Context-based reasoning"
      },
      "answer-1": {
        "model": "llama-32-3b-instruct",
        "endpoint": "http://llama-32-3b-instruct-predictor.my-first-model.svc.cluster.local:8080/v1",
        "role": "General-purpose answer (paper: gpt-5)"
      },
      "answer-2": {
        "model": "llama-32-3b-instruct",
        "endpoint": "http://llama-32-3b-instruct-predictor.my-first-model.svc.cluster.local:8080/v1",
        "role": "Budget answer (paper: gpt-5-mini)"
      },
      "answer-3": {
        "model": "llama-32-3b-instruct",
        "endpoint": "http://llama-32-3b-instruct-predictor.my-first-model.svc.cluster.local:8080/v1",
        "role": "Medium capability (paper: Llama-3.3-70B)"
      },
      "answer-4": {
        "model": "llama-32-3b-instruct",
        "endpoint": "http://llama-32-3b-instruct-predictor.my-first-model.svc.cluster.local:8080/v1",
        "role": "Basic capability (paper: Qwen3-32B)"
      },
      "answer-math-1": {
        "model": "llama-32-3b-instruct",
        "endpoint": "http://llama-32-3b-instruct-predictor.my-first-model.svc.cluster.local:8080/v1",
        "role": "Math specialist (paper: Qwen2.5-Math-72B)"
      },
      "answer-math-2": {
        "model": "llama-32-3b-instruct",
        "endpoint": "http://llama-32-3b-instruct-predictor.my-first-model.svc.cluster.local:8080/v1",
        "role": "Basic math (paper: Qwen2.5-Math-7B)"
      },
      "search-1": {
        "model": "llama-32-3b-instruct",
        "endpoint": "http://llama-32-3b-instruct-predictor.my-first-model.svc.cluster.local:8080/v1",
        "role": "Query generation for search"
      },
      "search-2": {
        "model": "llama-32-3b-instruct",
        "endpoint": "http://llama-32-3b-instruct-predictor.my-first-model.svc.cluster.local:8080/v1",
        "role": "Context-aware query generation"
      },
      "search-3": {
        "model": "llama-32-3b-instruct",
        "endpoint": "http://llama-32-3b-instruct-predictor.my-first-model.svc.cluster.local:8080/v1",
        "role": "Basic query generation"
      }
    }
