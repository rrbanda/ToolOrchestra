apiVersion: batch/v1
kind: Job
metadata:
  name: download-orchestrator-8b
  namespace: orchestrator-rhoai
  labels:
    app.kubernetes.io/name: download-orchestrator-8b
    app.kubernetes.io/component: model-download
    app.kubernetes.io/part-of: orchestrator-rhoai
spec:
  backoffLimit: 2
  ttlSecondsAfterFinished: 7200
  template:
    metadata:
      labels:
        app.kubernetes.io/name: download-orchestrator-8b
        app.kubernetes.io/component: model-download
    spec:
      restartPolicy: OnFailure
      nodeSelector:
        topology.kubernetes.io/zone: us-east-2a
      containers:
        - name: download
          image: registry.access.redhat.com/ubi9/python-311:latest
          command:
            - bash
            - -ec
            - |
              echo "=== Node and filesystem info ==="
              df -h /models
              echo ""
              echo "Installing huggingface_hub..."
              pip install -q huggingface_hub
              echo ""
              echo "Downloading nvidia/Nemotron-Orchestrator-8B..."
              python3 << 'PYEOF'
              from huggingface_hub import snapshot_download
              import os
              target = '/models/Nemotron-Orchestrator-8B'
              marker = os.path.join(target, '.download_complete')
              if os.path.exists(marker):
                  print('Model already downloaded (marker found). Skipping.')
                  exit(0)
              snapshot_download(
                  repo_id='nvidia/Nemotron-Orchestrator-8B',
                  local_dir=target,
                  ignore_patterns=['*.gguf', '*.bin', 'original/*'],
              )
              open(marker, 'w').write('ok')
              print('Download complete.')
              PYEOF
              echo ""
              echo "=== Verifying all 7 shards ==="
              all_ok=true
              for i in 1 2 3 4 5 6 7; do
                f="/models/Nemotron-Orchestrator-8B/model-0000${i}-of-00007.safetensors"
                if [ -f "$f" ]; then
                  size=$(du -h "$f" | cut -f1)
                  echo "  OK: model-0000${i}-of-00007.safetensors ($size)"
                else
                  echo "  MISSING: model-0000${i}-of-00007.safetensors"
                  all_ok=false
                fi
              done
              echo ""
              df -h /models
              du -sh /models/Nemotron-Orchestrator-8B/
              if [ "$all_ok" = true ]; then
                echo "ALL SHARDS VERIFIED OK"
              else
                echo "ERROR: Missing shards" && exit 1
              fi
          resources:
            requests:
              cpu: "1"
              memory: "4Gi"
            limits:
              cpu: "2"
              memory: "8Gi"
          volumeMounts:
            - name: model-storage
              mountPath: /models
      volumes:
        - name: model-storage
          persistentVolumeClaim:
            claimName: model-weights
