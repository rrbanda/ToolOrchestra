apiVersion: apps/v1
kind: Deployment
metadata:
  name: orchestrator-gateway
  namespace: orchestrator-rhoai
  labels:
    app.kubernetes.io/name: orchestrator-gateway
    app.kubernetes.io/component: gateway
    app.kubernetes.io/part-of: orchestrator-rhoai
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: orchestrator-gateway
  template:
    metadata:
      labels:
        app.kubernetes.io/name: orchestrator-gateway
        app.kubernetes.io/component: gateway
        app.kubernetes.io/part-of: orchestrator-rhoai
    spec:
      serviceAccountName: orchestrator-sa
      containers:
        - name: gateway
          image: ghcr.io/orchestrator-rhoai/gateway:latest
          ports:
            - containerPort: 8080
              protocol: TCP
              name: http
          env:
            - name: GATEWAY_MODEL_MAPPING_PATH
              value: /config/mapping.json
          volumeMounts:
            - name: model-mapping
              mountPath: /config
              readOnly: true
            - name: tool-definitions
              mountPath: /tools
              readOnly: true
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 2Gi
          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 15
      volumes:
        - name: model-mapping
          configMap:
            name: model-mapping
        - name: tool-definitions
          configMap:
            name: tool-definitions
