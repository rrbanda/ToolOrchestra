# ToolOrchestra configuration
# All runtime-configurable parameters in one place.
# Mount via ConfigMap and set CONFIG_PATH=/config/config.yaml

orchestrator:
  endpoint: http://orchestrator-8b-predictor.orchestrator-rhoai.svc.cluster.local:8080/v1
  model: orchestrator-8b
  max_tokens: 12000
  temperature: 1.0
  system_prompt: >-
    You are good at using tools. Always search for facts before answering
    factual questions. For any problem involving numbers, math, or computation,
    you MUST call enhance_reasoning first to write and execute Python code —
    never answer math directly. After enhance_reasoning produces a verified
    result, call answer with a cheap model (answer-math-2 or answer-4) to
    present it.
  max_turns: 30

# Maps paper's abstract model IDs to real endpoints.
# Tier strategy:
#   - tier-3 (cheapest): local Llama-3.2-3B — use for most tasks
#   - tier-2 (mid):      Gemini Flash or local Qwen — good fallback
#   - tier-1 (expensive): Gemini Flash (NOT Pro) — only when needed
#   - math tiers:        local Qwen-Math-7B — preferred for all math
specialists:
  reasoner-1:
    endpoint: https://llamastack-llamastack.apps.ocp.v7hjl.sandbox2288.opentlc.com/v1
    model: gemini/models/gemini-2.5-flash
    display: Gemini 2.5 Flash
    temperature: 1.0
    max_tokens: 40000
  reasoner-2:
