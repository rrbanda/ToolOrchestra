# PIPELINE DEFINITION
# Name: toolorchestra-model-switching
# Description: Demonstrates dynamic model switching: Orchestrator-8B answers with MCP doc search, then Specialist-3B summarizes via previous_response_id.
# Inputs:
#    instructions: str [Default: 'You are good at using tools. Search Red Hat documentation to answer accurately.']
#    llamastack_url: str [Default: 'http://llamastack-service.llamastack.svc.cluster.local:8321']
#    max_output_tokens: int [Default: 1024.0]
#    mcp_server_label: str [Default: 'rhokp']
#    mcp_server_url: str [Default: 'http://mcp-server.rhokp.svc.cluster.local:8010/mcp']
#    orchestrator_model: str [Default: 'vllm-orchestrator/orchestrator-8b']
#    question: str [Default: 'What is model serving in OpenShift AI?']
#    specialist_model: str [Default: 'vllm-inference/llama-32-3b-instruct']
#    summarize_max_tokens: int [Default: 512.0]
#    summarize_prompt: str [Default: 'Summarize the above answer in exactly 3 concise bullet points.']
components:
  comp-format-model-switch:
    executorLabel: exec-format-model-switch
    inputDefinitions:
      parameters:
        step1_result:
          parameterType: STRING
        step2_result:
          parameterType: STRING
    outputDefinitions:
      parameters:
        Output:
          parameterType: STRING
  comp-orchestrator-search:
    executorLabel: exec-orchestrator-search
    inputDefinitions:
      parameters:
        instructions:
          parameterType: STRING
        llamastack_url:
          parameterType: STRING
        max_output_tokens:
          parameterType: NUMBER_INTEGER
        mcp_server_label:
          parameterType: STRING
        mcp_server_url:
          parameterType: STRING
        model:
          parameterType: STRING
        question:
          parameterType: STRING
    outputDefinitions:
      parameters:
        Output:
          parameterType: STRING
  comp-specialist-summarize:
    executorLabel: exec-specialist-summarize
    inputDefinitions:
      parameters:
        llamastack_url:
          parameterType: STRING
        max_output_tokens:
          parameterType: NUMBER_INTEGER
        specialist_model:
          parameterType: STRING
        step1_result:
          parameterType: STRING
        summarize_prompt:
          parameterType: STRING
    outputDefinitions:
      parameters:
        Output:
          parameterType: STRING
deploymentSpec:
  executors:
    exec-format-model-switch:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - format_model_switch
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'kfp==2.16.0'\
          \ '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"3.9\"' && \"\
          $0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef format_model_switch(step1_result: str, step2_result: str) ->\
          \ str:\n    \"\"\"Format both steps showing the model switch.\"\"\"\n  \
          \  import json\n\n    s1 = json.loads(step1_result)\n    s2 = json.loads(step2_result)\n\
          \n    lines = [\n        \"=== PIPELINE: Dynamic Model Switching ===\",\n\
          \        \"\",\n        f\"Step 1 - Orchestrator ({s1['model']}):\",\n \
          \       f\"  Latency: {s1['latency_ms']}ms\",\n        f\"  Answer: {s1['answer'][:500]}\"\
          ,\n        \"\",\n        f\"Step 2 - Specialist ({s2['model']}):\",\n \
          \       f\"  Latency: {s2['latency_ms']}ms\",\n        f\"  Summary: {s2['summary']}\"\
          ,\n        \"\",\n        f\"Total latency: {s1['latency_ms'] + s2['latency_ms']}ms\"\
          ,\n        f\"Model switch: {s1['model']} -> {s2['model']}\",\n    ]\n \
          \   output = \"\\n\".join(lines)\n    print(output)\n    return output\n\
          \n"
        image: registry.access.redhat.com/ubi9/python-311:latest
    exec-orchestrator-search:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - orchestrator_search
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'httpx>=0.28.0'\
          \  &&  python3 -m pip install --quiet --no-warn-script-location 'kfp==2.16.0'\
          \ '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"3.9\"' && \"\
          $0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef orchestrator_search(\n    question: str,\n    llamastack_url:\
          \ str,\n    model: str,\n    mcp_server_url: str,\n    mcp_server_label:\
          \ str,\n    max_output_tokens: int,\n    instructions: str,\n) -> str:\n\
          \    \"\"\"Step 1: Orchestrator uses MCP tools to research the question.\"\
          \"\"\n    import json\n    import time\n\n    import httpx\n\n    start\
          \ = time.monotonic()\n    payload = {\n        \"model\": model,\n     \
          \   \"input\": question.strip(),\n        \"tools\": [\n            {\n\
          \                \"type\": \"mcp\",\n                \"server_label\": mcp_server_label,\n\
          \                \"server_url\": mcp_server_url,\n                \"require_approval\"\
          : \"never\",\n            }\n        ],\n        \"max_output_tokens\":\
          \ max_output_tokens,\n        \"instructions\": instructions,\n    }\n \
          \   with httpx.Client(timeout=300.0) as client:\n        resp = client.post(f\"\
          {llamastack_url.rstrip('/')}/v1/responses\", json=payload)\n        resp.raise_for_status()\n\
          \        data = resp.json()\n\n    answer = \"\"\n    for item in data.get(\"\
          output\", []):\n        if item.get(\"type\") == \"message\":\n        \
          \    for c in item.get(\"content\", []):\n                text = c.get(\"\
          text\", \"\")\n                if \"</think>\" in text:\n              \
          \      text = text.split(\"</think>\")[-1].strip()\n                answer\
          \ = text\n\n    return json.dumps({\n        \"response_id\": data.get(\"\
          id\", \"\"),\n        \"answer\": answer,\n        \"latency_ms\": round((time.monotonic()\
          \ - start) * 1000),\n        \"model\": model,\n        \"tokens\": data.get(\"\
          usage\", {}),\n    })\n\n"
        image: registry.access.redhat.com/ubi9/python-311:latest
    exec-specialist-summarize:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - specialist_summarize
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'httpx>=0.28.0'\
          \  &&  python3 -m pip install --quiet --no-warn-script-location 'kfp==2.16.0'\
          \ '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"3.9\"' && \"\
          $0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef specialist_summarize(\n    step1_result: str,\n    llamastack_url:\
          \ str,\n    specialist_model: str,\n    summarize_prompt: str,\n    max_output_tokens:\
          \ int,\n) -> str:\n    \"\"\"Step 2: Specialist model summarizes using conversation\
          \ context.\"\"\"\n    import json\n    import time\n\n    import httpx\n\
          \n    step1 = json.loads(step1_result)\n    prev_id = step1[\"response_id\"\
          ]\n\n    start = time.monotonic()\n    payload = {\n        \"model\": specialist_model,\n\
          \        \"input\": summarize_prompt,\n        \"previous_response_id\"\
          : prev_id,\n        \"max_output_tokens\": max_output_tokens,\n    }\n \
          \   with httpx.Client(timeout=300.0) as client:\n        resp = client.post(f\"\
          {llamastack_url.rstrip('/')}/v1/responses\", json=payload)\n        resp.raise_for_status()\n\
          \        data = resp.json()\n\n    summary = \"\"\n    for item in data.get(\"\
          output\", []):\n        if item.get(\"type\") == \"message\":\n        \
          \    for c in item.get(\"content\", []):\n                text = c.get(\"\
          text\", \"\")\n                if \"</think>\" in text:\n              \
          \      text = text.split(\"</think>\")[-1].strip()\n                summary\
          \ = text\n\n    return json.dumps({\n        \"response_id\": data.get(\"\
          id\", \"\"),\n        \"summary\": summary,\n        \"latency_ms\": round((time.monotonic()\
          \ - start) * 1000),\n        \"model\": specialist_model,\n        \"tokens\"\
          : data.get(\"usage\", {}),\n    })\n\n"
        image: registry.access.redhat.com/ubi9/python-311:latest
pipelineInfo:
  description: 'Demonstrates dynamic model switching: Orchestrator-8B answers with
    MCP doc search, then Specialist-3B summarizes via previous_response_id.'
  name: toolorchestra-model-switching
root:
  dag:
    tasks:
      format-model-switch:
        cachingOptions:
          enableCache: true
        componentRef:
          name: comp-format-model-switch
        dependentTasks:
        - orchestrator-search
        - specialist-summarize
        inputs:
          parameters:
            step1_result:
              taskOutputParameter:
                outputParameterKey: Output
                producerTask: orchestrator-search
            step2_result:
              taskOutputParameter:
                outputParameterKey: Output
                producerTask: specialist-summarize
        taskInfo:
          name: format-model-switch
      orchestrator-search:
        cachingOptions:
          enableCache: true
        componentRef:
          name: comp-orchestrator-search
        inputs:
          parameters:
            instructions:
              componentInputParameter: instructions
            llamastack_url:
              componentInputParameter: llamastack_url
            max_output_tokens:
              componentInputParameter: max_output_tokens
            mcp_server_label:
              componentInputParameter: mcp_server_label
            mcp_server_url:
              componentInputParameter: mcp_server_url
            model:
              componentInputParameter: orchestrator_model
            question:
              componentInputParameter: question
        taskInfo:
          name: orchestrator-search
      specialist-summarize:
        cachingOptions:
          enableCache: true
        componentRef:
          name: comp-specialist-summarize
        dependentTasks:
        - orchestrator-search
        inputs:
          parameters:
            llamastack_url:
              componentInputParameter: llamastack_url
            max_output_tokens:
              componentInputParameter: summarize_max_tokens
            specialist_model:
              componentInputParameter: specialist_model
            step1_result:
              taskOutputParameter:
                outputParameterKey: Output
                producerTask: orchestrator-search
            summarize_prompt:
              componentInputParameter: summarize_prompt
        taskInfo:
          name: specialist-summarize
  inputDefinitions:
    parameters:
      instructions:
        defaultValue: You are good at using tools. Search Red Hat documentation to
          answer accurately.
        isOptional: true
        parameterType: STRING
      llamastack_url:
        defaultValue: http://llamastack-service.llamastack.svc.cluster.local:8321
        isOptional: true
        parameterType: STRING
      max_output_tokens:
        defaultValue: 1024.0
        isOptional: true
        parameterType: NUMBER_INTEGER
      mcp_server_label:
        defaultValue: rhokp
        isOptional: true
        parameterType: STRING
      mcp_server_url:
        defaultValue: http://mcp-server.rhokp.svc.cluster.local:8010/mcp
        isOptional: true
        parameterType: STRING
      orchestrator_model:
        defaultValue: vllm-orchestrator/orchestrator-8b
        isOptional: true
        parameterType: STRING
      question:
        defaultValue: What is model serving in OpenShift AI?
        isOptional: true
        parameterType: STRING
      specialist_model:
        defaultValue: vllm-inference/llama-32-3b-instruct
        isOptional: true
        parameterType: STRING
      summarize_max_tokens:
        defaultValue: 512.0
        isOptional: true
        parameterType: NUMBER_INTEGER
      summarize_prompt:
        defaultValue: Summarize the above answer in exactly 3 concise bullet points.
        isOptional: true
        parameterType: STRING
schemaVersion: 2.1.0
sdkVersion: kfp-2.16.0
