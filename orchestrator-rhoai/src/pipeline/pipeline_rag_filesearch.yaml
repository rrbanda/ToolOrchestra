# PIPELINE DEFINITION
# Name: toolorchestra-rag-filesearch
# Description: Demonstrates RAG using LlamaStack file_search with vector stores. Documents are embedded via granite-embedding and searched at query time to ground answers in project documentation.
# Inputs:
#    instructions: str [Default: 'Search the uploaded files first, then answer based on what you find.']
#    llamastack_url: str [Default: 'http://llamastack-service.llamastack.svc.cluster.local:8321']
#    max_output_tokens: int [Default: 1024.0]
#    model: str [Default: 'vllm-inference/llama-32-3b-instruct']
#    question: str [Default: 'What results does ToolOrchestra achieve on the HLE benchmark?']
#    vector_store_id: str [Default: 'vs_4b92c181-1043-4bc8-8111-bfaba954886a']
components:
  comp-format-rag-result:
    executorLabel: exec-format-rag-result
    inputDefinitions:
      parameters:
        result_json:
          parameterType: STRING
    outputDefinitions:
      parameters:
        Output:
          parameterType: STRING
  comp-rag-query:
    executorLabel: exec-rag-query
    inputDefinitions:
      parameters:
        instructions:
          parameterType: STRING
        llamastack_url:
          parameterType: STRING
        max_output_tokens:
          parameterType: NUMBER_INTEGER
        model:
          parameterType: STRING
        question:
          parameterType: STRING
        vector_store_id:
          parameterType: STRING
    outputDefinitions:
      parameters:
        Output:
          parameterType: STRING
deploymentSpec:
  executors:
    exec-format-rag-result:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - format_rag_result
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'kfp==2.16.0'\
          \ '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"3.9\"' && \"\
          $0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef format_rag_result(result_json: str) -> str:\n    \"\"\"Format\
          \ the RAG result for display.\"\"\"\n    import json\n\n    data = json.loads(result_json)\n\
          \n    lines = [\n        \"=== PIPELINE: RAG File Search ===\",\n      \
          \  \"\",\n        f\"Question: {data['question']}\",\n        f\"Latency:\
          \ {data['latency_ms']}ms\",\n        f\"Tokens: {data['input_tokens']} in\
          \ / {data['output_tokens']} out\",\n        \"\",\n        f\"Search queries:\
          \ {data['search_queries']}\",\n        \"\",\n        f\"Answer: {data['answer']}\"\
          ,\n    ]\n\n    output = \"\\n\".join(lines)\n    print(output)\n    return\
          \ output\n\n"
        image: registry.access.redhat.com/ubi9/python-311:latest
    exec-rag-query:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - rag_query
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'httpx>=0.28.0'\
          \  &&  python3 -m pip install --quiet --no-warn-script-location 'kfp==2.16.0'\
          \ '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"3.9\"' && \"\
          $0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef rag_query(\n    question: str,\n    llamastack_url: str,\n  \
          \  model: str,\n    vector_store_id: str,\n    max_output_tokens: int,\n\
          \    instructions: str,\n) -> str:\n    \"\"\"Query the LLM with file_search\
          \ RAG augmentation.\"\"\"\n    import json\n    import time\n\n    import\
          \ httpx\n\n    start = time.monotonic()\n    payload = {\n        \"model\"\
          : model,\n        \"input\": question.strip(),\n        \"tools\": [\n \
          \           {\n                \"type\": \"file_search\",\n            \
          \    \"vector_store_ids\": [vector_store_id],\n            }\n        ],\n\
          \        \"max_output_tokens\": max_output_tokens,\n        \"instructions\"\
          : instructions,\n    }\n    with httpx.Client(timeout=300.0) as client:\n\
          \        resp = client.post(f\"{llamastack_url.rstrip('/')}/v1/responses\"\
          , json=payload)\n        resp.raise_for_status()\n        data = resp.json()\n\
          \n    answer = \"\"\n    search_queries = []\n    for item in data.get(\"\
          output\", []):\n        if item.get(\"type\") == \"file_search_call\":\n\
          \            search_queries = item.get(\"queries\", [])\n        elif item.get(\"\
          type\") == \"message\":\n            for c in item.get(\"content\", []):\n\
          \                text = c.get(\"text\", \"\")\n                if \"</think>\"\
          \ in text:\n                    text = text.split(\"</think>\")[-1].strip()\n\
          \                answer = text\n\n    usage = data.get(\"usage\", {})\n\n\
          \    return json.dumps({\n        \"question\": question.strip(),\n    \
          \    \"answer\": answer or \"(No answer produced)\",\n        \"search_queries\"\
          : search_queries,\n        \"response_id\": data.get(\"id\", \"\"),\n  \
          \      \"latency_ms\": round((time.monotonic() - start) * 1000),\n     \
          \   \"input_tokens\": usage.get(\"input_tokens\", 0),\n        \"output_tokens\"\
          : usage.get(\"output_tokens\", 0),\n    })\n\n"
        image: registry.access.redhat.com/ubi9/python-311:latest
pipelineInfo:
  description: Demonstrates RAG using LlamaStack file_search with vector stores. Documents
    are embedded via granite-embedding and searched at query time to ground answers
    in project documentation.
  name: toolorchestra-rag-filesearch
root:
  dag:
    tasks:
      format-rag-result:
        cachingOptions:
          enableCache: true
        componentRef:
          name: comp-format-rag-result
        dependentTasks:
        - rag-query
        inputs:
          parameters:
            result_json:
              taskOutputParameter:
                outputParameterKey: Output
                producerTask: rag-query
        taskInfo:
          name: format-rag-result
      rag-query:
        cachingOptions:
          enableCache: true
        componentRef:
          name: comp-rag-query
        inputs:
          parameters:
            instructions:
              componentInputParameter: instructions
            llamastack_url:
              componentInputParameter: llamastack_url
            max_output_tokens:
              componentInputParameter: max_output_tokens
            model:
              componentInputParameter: model
            question:
              componentInputParameter: question
            vector_store_id:
              componentInputParameter: vector_store_id
        taskInfo:
          name: rag-query
  inputDefinitions:
    parameters:
      instructions:
        defaultValue: Search the uploaded files first, then answer based on what you
          find.
        isOptional: true
        parameterType: STRING
      llamastack_url:
        defaultValue: http://llamastack-service.llamastack.svc.cluster.local:8321
        isOptional: true
        parameterType: STRING
      max_output_tokens:
        defaultValue: 1024.0
        isOptional: true
        parameterType: NUMBER_INTEGER
      model:
        defaultValue: vllm-inference/llama-32-3b-instruct
        isOptional: true
        parameterType: STRING
      question:
        defaultValue: What results does ToolOrchestra achieve on the HLE benchmark?
        isOptional: true
        parameterType: STRING
      vector_store_id:
        defaultValue: vs_4b92c181-1043-4bc8-8111-bfaba954886a
        isOptional: true
        parameterType: STRING
schemaVersion: 2.1.0
sdkVersion: kfp-2.16.0
