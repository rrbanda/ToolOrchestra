# PIPELINE DEFINITION
# Name: toolorchestra-true-orchestration
# Description: ToolOrchestra paper-faithful orchestration: Orchestrator-8B (agent) calls specialist models via vLLM chat completions. Multi-turn loop with search, reasoning, and answer tools routed to configurable specialists.
# Inputs:
#    max_output_tokens: int [Default: 2048.0]
#    max_turns: int [Default: 10.0]
#    model_mapping_json: str [Default: '{"search-1": {"endpoint": "http://llama-32-3b-instruct-predictor.my-first-model.svc.cluster.local:8080/v1", "model": "llama-32-3b-instruct"}, "search-2": {"endpoint": "http://llama-32-3b-instruct-predictor.my-first-model.svc.cluster.local:8080/v1", "model": "llama-32-3b-instruct"}, "search-3": {"endpoint": "http://llama-32-3b-instruct-predictor.my-first-model.svc.cluster.local:8080/v1", "model": "llama-32-3b-instruct"}, "reasoner-1": {"endpoint": "http://llama-32-3b-instruct-predictor.my-first-model.svc.cluster.local:8080/v1", "model": "llama-32-3b-instruct"}, "reasoner-2": {"endpoint": "http://llama-32-3b-instruct-predictor.my-first-model.svc.cluster.local:8080/v1", "model": "llama-32-3b-instruct"}, "reasoner-3": {"endpoint": "http://llama-32-3b-instruct-predictor.my-first-model.svc.cluster.local:8080/v1", "model": "llama-32-3b-instruct"}, "answer-1": {"endpoint": "http://llama-32-3b-instruct-predictor.my-first-model.svc.cluster.local:8080/v1", "model": "llama-32-3b-instruct"}, "answer-2": {"endpoint": "http://llama-32-3b-instruct-predictor.my-first-model.svc.cluster.local:8080/v1", "model": "llama-32-3b-instruct"}, "answer-3": {"endpoint": "http://llama-32-3b-instruct-predictor.my-first-model.svc.cluster.local:8080/v1", "model": "llama-32-3b-instruct"}, "answer-4": {"endpoint": "http://llama-32-3b-instruct-predictor.my-first-model.svc.cluster.local:8080/v1", "model": "llama-32-3b-instruct"}, "answer-math-1": {"endpoint": "http://llama-32-3b-instruct-predictor.my-first-model.svc.cluster.local:8080/v1", "model": "llama-32-3b-instruct"}, "answer-math-2": {"endpoint": "http://llama-32-3b-instruct-predictor.my-first-model.svc.cluster.local:8080/v1", "model": "llama-32-3b-instruct"}}']
#    orchestrator_endpoint: str [Default: 'http://orchestrator-8b-predictor.orchestrator-rhoai.svc.cluster.local:8080/v1']
#    orchestrator_model: str [Default: 'orchestrator-8b']
#    question: str [Default: 'What is 7 factorial?']
#    tool_definitions_json: str [Default: '[{"type": "function", "function": {"name": "enhance_reasoning", "description": "tool to enhance answer model reasoning. analyze the problem, write code, execute it and return intermidiate results that will help solve the problem", "parameters": {"properties": {"model": {"description": "The model used to reason. Choices: ['reasoner-1', 'reasoner-2', 'reasoner-3']. reasoner-1 demonstrates strong understanding and reasoning capabilities, which usually provides reliable insights. reasoner-2 can analyze some problems, but could hallucinate and make mistakes in difficult scenarios. reasoner-3 can reason over the context and reveal the logic. \nModel | price per million input tokens | price per million output tokens | average latency\nreasoner-1 | $1.25 | $10 | 31s\nreasoner-2 | $0.25 | $2 | 25s\nreasoner-3 | $0.8 | $0.8 | 9s", "type": "string"}}, "required": ["model"], "type": "object"}}}, {"type": "function", "function": {"name": "answer", "description": "give the final answer. Not allowed to call if documents is empty.", "parameters": {"properties": {"model": {"description": "The model used to answer. Choices: ['answer-1', 'answer-2', 'answer-3', 'answer-4', 'answer-math-1', 'answer-math-2']. answer-1 exhibits strong functional calling abilities and performs excellent in most domains. answer-math-1 can solve moderate math problems. answer-math-2 handles basic math.\nModel | price per million input tokens | price per million output tokens | average latency\nanswer-1 | $1.25 | $10 | 96s\nanswer-2 | $0.25 | $2 | 27s\nanswer-3 | $0.9 | $0.9 | 15s\nanswer-4 | $0.8 | $0.8 | 11s\nanswer-math-1 | $0.9 | $0.9 | 13s\nanswer-math-2 | $0.2 | $0.2 | 9s", "type": "string"}}, "required": ["model"], "type": "object"}}}, {"type": "function", "function": {"name": "search", "description": "Search for missing information", "parameters": {"properties": {"model": {"description": "The model used to search for missing information. Choices: ['search-1', 'search-2', 'search-3']. search-1 usually identifies the missing information and can write concise queries. search-2 can reason over context and write queries. search-3 can also write queries.\nModel | price per million input tokens | price per million output tokens | average latency\nsearch-1 | $1.25 | $10 | 22s\nsearch-2 | $0.25 | $2 | 16s\nsearch-3 | $0.8 | $0.8 | 8s", "type": "string"}}, "required": ["model"], "type": "object"}}}]']
components:
  comp-format-output:
    executorLabel: exec-format-output
    inputDefinitions:
      parameters:
        result_json:
          parameterType: STRING
    outputDefinitions:
      parameters:
        Output:
          parameterType: STRING
  comp-orchestration-loop:
    executorLabel: exec-orchestration-loop
    inputDefinitions:
      parameters:
        max_output_tokens:
          parameterType: NUMBER_INTEGER
        max_turns:
          parameterType: NUMBER_INTEGER
        model_mapping_json:
          parameterType: STRING
        orchestrator_endpoint:
          parameterType: STRING
        orchestrator_model:
          parameterType: STRING
        question:
          parameterType: STRING
        tool_definitions_json:
          parameterType: STRING
    outputDefinitions:
      parameters:
        Output:
          parameterType: STRING
deploymentSpec:
  executors:
    exec-format-output:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - format_output
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'kfp==2.16.0'\
          \ '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"3.9\"' && \"\
          $0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef format_output(result_json: str) -> str:\n    \"\"\"Format the\
          \ orchestration result for display.\"\"\"\n    import json\n\n    data =\
          \ json.loads(result_json)\n\n    lines = [\n        \"=== ToolOrchestra\
          \ Orchestration Result ===\",\n        \"\",\n        f\"Question: {data['question']}\"\
          ,\n        f\"Total turns: {data['total_turns']}\",\n        f\"Total latency:\
          \ {data['total_latency_ms']}ms\",\n        f\"Estimated cost: ${data.get('est_total_cost_usd',\
          \ 0):.6f}\",\n        \"\",\n        \"Tool trace (Orchestrator-8B decisions):\"\
          ,\n    ]\n    for t in data.get(\"tool_trace\", []):\n        spec = t.get(\"\
          specialist\", \"\")\n        latency = t.get(\"latency_ms\", \"\")\n   \
          \     cost = t.get(\"est_cost_usd\", 0)\n        query = t.get(\"query\"\
          , \"\")\n        note = t.get(\"note\", \"\")\n        code_exec = t.get(\"\
          code_executed\", None)\n        detail = f\" query={query}\" if query else\
          \ (f\" {note}\" if note else \"\")\n        if code_exec is not None:\n\
          \            detail += f\" code_executed={code_exec}\"\n        lines.append(\n\
          \            f\"  Turn {t['turn']}: {t['tool']}  specialist={spec}  \"\n\
          \            f\"[{latency}ms, ${cost:.6f}]{detail}\"\n        )\n\n    lines.append(\"\
          \")\n    lines.append(f\"Answer (from specialist model):\\n{data['answer']}\"\
          )\n\n    summary = \"\\n\".join(lines)\n    print(summary)\n    return summary\n\
          \n"
        image: registry.access.redhat.com/ubi9/python-311:latest
    exec-orchestration-loop:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - orchestration_loop
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'httpx>=0.28.0'\
          \ 'duckduckgo-search>=7.0.0'  &&  python3 -m pip install --quiet --no-warn-script-location\
          \ 'kfp==2.16.0' '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"\
          3.9\"' && \"$0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef orchestration_loop(\n    question: str,\n    orchestrator_endpoint:\
          \ str,\n    orchestrator_model: str,\n    model_mapping_json: str,\n   \
          \ tool_definitions_json: str,\n    max_turns: int,\n    max_output_tokens:\
          \ int,\n) -> str:\n    \"\"\"Run the ToolOrchestra multi-turn orchestration\
          \ loop.\n\n    Matches the paper's architecture:\n    1. Call Orchestrator-8B\
          \ via vLLM /v1/chat/completions with tool definitions\n    2. Parse tool_calls\
          \ from response\n    3. Route to the specialist model specified by MODEL_MAPPING\n\
          \    4. Feed specialist result back to orchestrator\n    5. Repeat until\
          \ orchestrator calls 'answer' or max_turns reached\n    \"\"\"\n    import\
          \ json\n    import os\n    import subprocess\n    import tempfile\n    import\
          \ time\n\n    import httpx\n\n    if not question or not question.strip():\n\
          \        raise ValueError(\"Question must be a non-empty string\")\n\n \
          \   tools = json.loads(tool_definitions_json)\n    model_mapping = json.loads(model_mapping_json)\n\
          \n    TOOL_PRICING = {\n        \"reasoner-1\": {\"input\": 1.25, \"output\"\
          : 10.0},\n        \"reasoner-2\": {\"input\": 0.25, \"output\": 2.0},\n\
          \        \"reasoner-3\": {\"input\": 0.8, \"output\": 0.8},\n        \"\
          answer-1\": {\"input\": 1.25, \"output\": 10.0},\n        \"answer-2\":\
          \ {\"input\": 0.25, \"output\": 2.0},\n        \"answer-3\": {\"input\"\
          : 0.9, \"output\": 0.9},\n        \"answer-4\": {\"input\": 0.8, \"output\"\
          : 0.8},\n        \"answer-math-1\": {\"input\": 0.9, \"output\": 0.9},\n\
          \        \"answer-math-2\": {\"input\": 0.2, \"output\": 0.2},\n       \
          \ \"search-1\": {\"input\": 1.25, \"output\": 10.0},\n        \"search-2\"\
          : {\"input\": 0.25, \"output\": 2.0},\n        \"search-3\": {\"input\"\
          : 0.8, \"output\": 0.8},\n    }\n    total_cost = 0.0\n\n    def chat_completion(endpoint,\
          \ model, messages, tools_list=None, max_tokens=2048):\n        url = f\"\
          {endpoint.rstrip('/')}/chat/completions\"\n        payload = {\n       \
          \     \"model\": model,\n            \"messages\": messages,\n         \
          \   \"max_tokens\": max_tokens,\n            \"temperature\": 1.0,\n   \
          \     }\n        if tools_list:\n            payload[\"tools\"] = tools_list\n\
          \            payload[\"tool_choice\"] = \"auto\"\n        with httpx.Client(timeout=180.0)\
          \ as client:\n            resp = client.post(url, json=payload)\n      \
          \      resp.raise_for_status()\n            return resp.json()\n\n    def\
          \ call_specialist(endpoint, model, messages, max_tokens=1024):\n       \
          \ return chat_completion(endpoint, model, messages, max_tokens=max_tokens)\n\
          \n    def handle_search(problem, context_str, spec_endpoint, spec_model):\n\
          \        prompt = f\"{context_str}\\n\\nProblem: {problem}\\n\\nGenerate\
          \ a concise web search query to find the missing information. Output only\
          \ the query, nothing else.\"\n        msgs = [\n            {\"role\": \"\
          system\", \"content\": \"You generate concise search queries.\"},\n    \
          \        {\"role\": \"user\", \"content\": prompt},\n        ]\n       \
          \ resp = call_specialist(spec_endpoint, spec_model, msgs, max_tokens=128)\n\
          \        query = resp[\"choices\"][0][\"message\"].get(\"content\", problem).strip().strip('\"\
          ').strip(\"'\")\n\n        try:\n            from duckduckgo_search import\
          \ DDGS\n            results = []\n            with DDGS() as ddgs:\n   \
          \             for r in ddgs.text(query, max_results=3):\n              \
          \      results.append(f\"Title: {r.get('title','')}\\n{r.get('body','')}\\\
          nURL: {r.get('href','')}\")\n            search_output = \"\\n\\n\".join(results)\
          \ if results else f\"No results for: {query}\"\n        except Exception:\n\
          \            search_output = f\"Search unavailable for: {query}\"\n\n  \
          \      return search_output, query\n\n    def handle_reasoning(problem,\
          \ context_str, spec_endpoint, spec_model):\n        prompt = (\n       \
          \     f\"{context_str}\\n\\nQuestion: {problem}\\n\\n\"\n            \"\
          Instead of directly answering the question, please write additional \"\n\
          \            \"Python code that will give intermediate results after execution.\
          \ \"\n            \"Wrap the code within ```python and ```. The code should\
          \ be \"\n            \"self-contained with all the import and initialization.\"\
          \n        )\n        msgs = [\n            {\"role\": \"system\", \"content\"\
          : \"You are an expert analyst. Write executable Python code to solve problems\
          \ step by step.\"},\n            {\"role\": \"user\", \"content\": prompt},\n\
          \        ]\n        resp = call_specialist(spec_endpoint, spec_model, msgs,\
          \ max_tokens=1024)\n        content = resp[\"choices\"][0][\"message\"].get(\"\
          content\", \"\")\n        if \"</think>\" in content:\n            content\
          \ = content.split(\"</think>\")[-1].strip()\n\n        generated_code =\
          \ \"\"\n        exec_result = \"\"\n        if \"```python\" in content:\n\
          \            try:\n                generated_code = content.split(\"```python\"\
          )[-1].split(\"```\")[0].strip()\n            except (IndexError, ValueError):\n\
          \                generated_code = \"\"\n\n        if generated_code:\n \
          \           try:\n                with tempfile.NamedTemporaryFile(\n  \
          \                  mode=\"w\", suffix=\".py\", delete=False, dir=\"/tmp\"\
          \n                ) as f:\n                    f.write(generated_code)\n\
          \                    code_path = f.name\n                result = subprocess.run(\n\
          \                    [\"python3\", code_path],\n                    timeout=30,\n\
          \                    capture_output=True,\n                    text=True,\n\
          \                )\n                exec_result = result.stdout.strip()\n\
          \                if result.returncode != 0 and result.stderr:\n        \
          \            exec_result += f\"\\n[stderr]: {result.stderr[:500]}\"\n  \
          \              os.unlink(code_path)\n            except subprocess.TimeoutExpired:\n\
          \                exec_result = \"[Code execution timed out after 30s]\"\n\
          \            except Exception as e:\n                exec_result = f\"[Code\
          \ execution error: {e}]\"\n\n        parts = []\n        if generated_code:\n\
          \            parts.append(f\"Generated code:\\n```python\\n{generated_code}\\\
          n```\")\n        if exec_result:\n            parts.append(f\"Execution\
          \ output:\\n{exec_result}\")\n        if not parts:\n            parts.append(content)\n\
          \n        return \"\\n\\n\".join(parts)\n\n    def handle_answer(problem,\
          \ context_str, spec_endpoint, spec_model):\n        prompt = f\"{context_str}\\\
          n\\nProblem:\\n{problem}\"\n        msgs = [\n            {\"role\": \"\
          system\", \"content\": \"Please reason step by step and give a clear, concise\
          \ final answer.\"},\n            {\"role\": \"user\", \"content\": prompt},\n\
          \        ]\n        resp = call_specialist(spec_endpoint, spec_model, msgs,\
          \ max_tokens=1024)\n        content = resp[\"choices\"][0][\"message\"].get(\"\
          content\", \"\")\n        if \"</think>\" in content:\n            content\
          \ = content.split(\"</think>\")[-1].strip()\n        return content\n\n\
          \    doc_list = []\n    reasoning_list = []\n    tool_trace = []\n    used_tools\
          \ = []\n    final_answer = \"\"\n    total_start = time.monotonic()\n\n\
          \    for turn in range(max_turns):\n        ctx_parts = []\n        if doc_list:\n\
          \            ctx_parts.append(\"Documents:\\n\" + \"\\n\\n\".join(\n   \
          \             f\"Doc {i+1}: {d[:1200]}\" for i, d in enumerate(doc_list)\n\
          \            ))\n        if reasoning_list:\n            ctx_parts.append(\"\
          Previous analysis:\\n\" + \"\\n\\n\".join(reasoning_list))\n        context_str\
          \ = \"\\n\\n\".join(ctx_parts)\n\n        user_content = f\"Problem: {question}\"\
          \n        if context_str:\n            user_content += f\"\\n\\n{context_str}\"\
          \n        user_content += \"\\n\\nChoose an appropriate tool.\"\n\n    \
          \    current_tools = list(tools)\n        if turn == max_turns - 1 and (doc_list\
          \ or reasoning_list):\n            current_tools = [t for t in tools if\
          \ t[\"function\"][\"name\"] == \"answer\"]\n        elif len(used_tools)\
          \ > 1 and used_tools[-1] == used_tools[-2]:\n            repeated = used_tools[-1]\n\
          \            current_tools = [t for t in tools if t[\"function\"][\"name\"\
          ] != repeated]\n\n        try:\n            orch_resp = chat_completion(\n\
          \                orchestrator_endpoint,\n                orchestrator_model,\n\
          \                [\n                    {\"role\": \"system\", \"content\"\
          : \"You are good at using tools.\"},\n                    {\"role\": \"\
          user\", \"content\": user_content},\n                ],\n              \
          \  tools_list=current_tools,\n                max_tokens=max_output_tokens,\n\
          \            )\n        except Exception as e:\n            tool_trace.append({\"\
          turn\": turn, \"tool\": \"error\", \"error\": str(e)})\n            break\n\
          \n        choice = orch_resp[\"choices\"][0]\n        msg = choice[\"message\"\
          ]\n        tc_list = msg.get(\"tool_calls\", [])\n\n        if not tc_list:\n\
          \            content = msg.get(\"content\", \"\")\n            if content\
          \ and \"</think>\" in content:\n                final_answer = content.split(\"\
          </think>\")[-1].strip()\n            elif content:\n                final_answer\
          \ = content\n            tool_trace.append({\"turn\": turn, \"tool\": \"\
          (direct)\", \"note\": \"No tool called\"})\n            break\n\n      \
          \  tc = tc_list[0]\n        tool_name = tc[\"function\"][\"name\"]\n   \
          \     try:\n            tool_args = json.loads(tc[\"function\"][\"arguments\"\
          ])\n        except (json.JSONDecodeError, KeyError):\n            tool_args\
          \ = {}\n\n        model_id = tool_args.get(\"model\", \"\")\n        used_tools.append(tool_name)\n\
          \n        spec_info = model_mapping.get(model_id, {})\n        spec_endpoint\
          \ = spec_info.get(\"endpoint\", orchestrator_endpoint)\n        spec_model\
          \ = spec_info.get(\"model\", orchestrator_model)\n\n        start = time.monotonic()\n\
          \n        pricing = TOOL_PRICING.get(model_id, {\"input\": 0.0, \"output\"\
          : 0.0})\n        est_input_tokens = len(question.split()) * 2 + len(context_str.split())\
          \ * 2\n        est_output_tokens = 300\n        step_cost = (est_input_tokens\
          \ * pricing[\"input\"] + est_output_tokens * pricing[\"output\"]) / 1_000_000\n\
          \n        if tool_name == \"search\":\n            search_output, query\
          \ = handle_search(question, context_str, spec_endpoint, spec_model)\n  \
          \          doc_list.append(search_output)\n            latency = round((time.monotonic()\
          \ - start) * 1000)\n            total_cost += step_cost\n            tool_trace.append({\n\
          \                \"turn\": turn,\n                \"tool\": \"search\",\n\
          \                \"specialist\": f\"{spec_model}@{model_id}\",\n       \
          \         \"query\": query,\n                \"latency_ms\": latency,\n\
          \                \"est_cost_usd\": round(step_cost, 6),\n            })\n\
          \n        elif tool_name == \"enhance_reasoning\":\n            reasoning\
          \ = handle_reasoning(question, context_str, spec_endpoint, spec_model)\n\
          \            if reasoning:\n                reasoning_list.append(reasoning)\n\
          \            latency = round((time.monotonic() - start) * 1000)\n      \
          \      est_output_tokens = 500\n            step_cost = (est_input_tokens\
          \ * pricing[\"input\"] + est_output_tokens * pricing[\"output\"]) / 1_000_000\n\
          \            total_cost += step_cost\n            has_code = \"Generated\
          \ code:\" in reasoning if reasoning else False\n            tool_trace.append({\n\
          \                \"turn\": turn,\n                \"tool\": \"enhance_reasoning\"\
          ,\n                \"specialist\": f\"{spec_model}@{model_id}\",\n     \
          \           \"latency_ms\": latency,\n                \"code_executed\"\
          : has_code,\n                \"est_cost_usd\": round(step_cost, 6),\n  \
          \          })\n\n        elif tool_name == \"answer\":\n            final_answer\
          \ = handle_answer(question, context_str, spec_endpoint, spec_model)\n  \
          \          latency = round((time.monotonic() - start) * 1000)\n        \
          \    total_cost += step_cost\n            tool_trace.append({\n        \
          \        \"turn\": turn,\n                \"tool\": \"answer\",\n      \
          \          \"specialist\": f\"{spec_model}@{model_id}\",\n             \
          \   \"latency_ms\": latency,\n                \"est_cost_usd\": round(step_cost,\
          \ 6),\n            })\n            break\n\n        else:\n            tool_trace.append({\"\
          turn\": turn, \"tool\": tool_name, \"note\": \"Unknown tool\"})\n\n    total_latency\
          \ = round((time.monotonic() - total_start) * 1000)\n\n    if not final_answer\
          \ and tool_trace:\n        final_answer = \"(Orchestrator did not produce\
          \ a final answer within the allowed turns)\"\n\n    return json.dumps({\n\
          \        \"question\": question.strip(),\n        \"answer\": final_answer,\n\
          \        \"tool_trace\": tool_trace,\n        \"total_turns\": len(tool_trace),\n\
          \        \"total_latency_ms\": total_latency,\n        \"est_total_cost_usd\"\
          : round(total_cost, 6),\n    })\n\n"
        image: registry.access.redhat.com/ubi9/python-311:latest
pipelineInfo:
  description: 'ToolOrchestra paper-faithful orchestration: Orchestrator-8B (agent)
    calls specialist models via vLLM chat completions. Multi-turn loop with search,
    reasoning, and answer tools routed to configurable specialists.'
  name: toolorchestra-true-orchestration
root:
  dag:
    tasks:
      format-output:
        cachingOptions:
          enableCache: true
        componentRef:
          name: comp-format-output
        dependentTasks:
        - orchestration-loop
        inputs:
          parameters:
            result_json:
              taskOutputParameter:
                outputParameterKey: Output
                producerTask: orchestration-loop
        taskInfo:
          name: format-output
      orchestration-loop:
        cachingOptions:
          enableCache: true
        componentRef:
          name: comp-orchestration-loop
        inputs:
          parameters:
            max_output_tokens:
              componentInputParameter: max_output_tokens
            max_turns:
              componentInputParameter: max_turns
            model_mapping_json:
              componentInputParameter: model_mapping_json
            orchestrator_endpoint:
