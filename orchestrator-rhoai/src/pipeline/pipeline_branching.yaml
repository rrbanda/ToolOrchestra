# PIPELINE DEFINITION
# Name: toolorchestra-branching
# Description: Demonstrates conversation branching: ask an initial question, then branch from that response to explore a different angle via previous_response_id.
# Inputs:
#    branch_question: str [Default: 'Instead, tell me about GPU requirements for model serving.']
#    instructions: str [Default: 'You are good at using tools. Search Red Hat documentation to answer accurately.']
#    llamastack_url: str [Default: 'http://llamastack-service.llamastack.svc.cluster.local:8321']
#    max_output_tokens: int [Default: 1024.0]
#    mcp_server_label: str [Default: 'rhokp']
#    mcp_server_url: str [Default: 'http://mcp-server.rhokp.svc.cluster.local:8010/mcp']
#    model: str [Default: 'vllm-orchestrator/orchestrator-8b']
#    question: str [Default: 'How does OpenShift AI handle model serving?']
components:
  comp-branch-query:
    executorLabel: exec-branch-query
    inputDefinitions:
      parameters:
        branch_question:
          parameterType: STRING
        instructions:
          parameterType: STRING
        llamastack_url:
          parameterType: STRING
        max_output_tokens:
          parameterType: NUMBER_INTEGER
        mcp_server_label:
          parameterType: STRING
        mcp_server_url:
          parameterType: STRING
        model:
          parameterType: STRING
        step1_result:
          parameterType: STRING
    outputDefinitions:
      parameters:
        Output:
          parameterType: STRING
  comp-compare-branches:
    executorLabel: exec-compare-branches
    inputDefinitions:
      parameters:
        branch_question:
          parameterType: STRING
        branch_result:
          parameterType: STRING
        question:
          parameterType: STRING
        step1_result:
          parameterType: STRING
    outputDefinitions:
      parameters:
        Output:
          parameterType: STRING
  comp-initial-query:
    executorLabel: exec-initial-query
    inputDefinitions:
      parameters:
        instructions:
          parameterType: STRING
        llamastack_url:
          parameterType: STRING
        max_output_tokens:
          parameterType: NUMBER_INTEGER
        mcp_server_label:
          parameterType: STRING
        mcp_server_url:
          parameterType: STRING
        model:
          parameterType: STRING
        question:
          parameterType: STRING
    outputDefinitions:
      parameters:
        Output:
          parameterType: STRING
deploymentSpec:
  executors:
    exec-branch-query:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - branch_query
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'httpx>=0.28.0'\
          \  &&  python3 -m pip install --quiet --no-warn-script-location 'kfp==2.16.0'\
          \ '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"3.9\"' && \"\
          $0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef branch_query(\n    branch_question: str,\n    step1_result: str,\n\
          \    llamastack_url: str,\n    model: str,\n    mcp_server_url: str,\n \
          \   mcp_server_label: str,\n    max_output_tokens: int,\n    instructions:\
          \ str,\n) -> str:\n    \"\"\"Step 2: Branch from step 1 with a different\
          \ angle.\"\"\"\n    import json\n    import time\n\n    import httpx\n\n\
          \    step1 = json.loads(step1_result)\n    prev_id = step1[\"response_id\"\
          ]\n\n    start = time.monotonic()\n    payload = {\n        \"model\": model,\n\
          \        \"input\": branch_question.strip(),\n        \"tools\": [\n   \
          \         {\n                \"type\": \"mcp\",\n                \"server_label\"\
          : mcp_server_label,\n                \"server_url\": mcp_server_url,\n \
          \               \"require_approval\": \"never\",\n            }\n      \
          \  ],\n        \"max_output_tokens\": max_output_tokens,\n        \"previous_response_id\"\
          : prev_id,\n        \"instructions\": instructions,\n    }\n    with httpx.Client(timeout=300.0)\
          \ as client:\n        resp = client.post(f\"{llamastack_url.rstrip('/')}/v1/responses\"\
          , json=payload)\n        resp.raise_for_status()\n        data = resp.json()\n\
          \n    answer = \"\"\n    for item in data.get(\"output\", []):\n       \
          \ if item.get(\"type\") == \"message\":\n            for c in item.get(\"\
          content\", []):\n                text = c.get(\"text\", \"\")\n        \
          \        if \"</think>\" in text:\n                    text = text.split(\"\
          </think>\")[-1].strip()\n                answer = text\n\n    return json.dumps({\n\
          \        \"response_id\": data.get(\"id\", \"\"),\n        \"previous_response_id\"\
          : prev_id,\n        \"answer\": answer,\n        \"latency_ms\": round((time.monotonic()\
          \ - start) * 1000),\n    })\n\n"
        image: registry.access.redhat.com/ubi9/python-311:latest
    exec-compare-branches:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - compare_branches
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'kfp==2.16.0'\
          \ '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"3.9\"' && \"\
          $0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef compare_branches(\n    question: str,\n    branch_question: str,\n\
          \    step1_result: str,\n    branch_result: str,\n) -> str:\n    \"\"\"\
          Step 3: Compare the original and branched responses.\"\"\"\n    import json\n\
          \n    s1 = json.loads(step1_result)\n    br = json.loads(branch_result)\n\
          \n    lines = [\n        \"=== PIPELINE: Conversation Branching ===\",\n\
          \        \"\",\n        f\"Original question: {question}\",\n        f\"\
          \  Latency: {s1['latency_ms']}ms\",\n        f\"  Answer: {s1['answer'][:400]}\"\
          ,\n        \"\",\n        f\"Branch question: {branch_question}\",\n   \
          \     f\"  Branched from: {br['previous_response_id'][:30]}...\",\n    \
          \    f\"  Latency: {br['latency_ms']}ms\",\n        f\"  Answer: {br['answer'][:400]}\"\
          ,\n        \"\",\n        f\"Total latency: {s1['latency_ms'] + br['latency_ms']}ms\"\
          ,\n    ]\n    output = \"\\n\".join(lines)\n    print(output)\n    return\
          \ output\n\n"
        image: registry.access.redhat.com/ubi9/python-311:latest
    exec-initial-query:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - initial_query
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'httpx>=0.28.0'\
          \  &&  python3 -m pip install --quiet --no-warn-script-location 'kfp==2.16.0'\
          \ '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"3.9\"' && \"\
          $0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef initial_query(\n    question: str,\n    llamastack_url: str,\n\
          \    model: str,\n    mcp_server_url: str,\n    mcp_server_label: str,\n\
          \    max_output_tokens: int,\n    instructions: str,\n) -> str:\n    \"\"\
          \"Step 1: Initial question with MCP doc search.\"\"\"\n    import json\n\
          \    import time\n\n    import httpx\n\n    start = time.monotonic()\n \
          \   payload = {\n        \"model\": model,\n        \"input\": question.strip(),\n\
          \        \"tools\": [\n            {\n                \"type\": \"mcp\"\
          ,\n                \"server_label\": mcp_server_label,\n               \
          \ \"server_url\": mcp_server_url,\n                \"require_approval\"\
          : \"never\",\n            }\n        ],\n        \"max_output_tokens\":\
          \ max_output_tokens,\n        \"instructions\": instructions,\n    }\n \
          \   with httpx.Client(timeout=300.0) as client:\n        resp = client.post(f\"\
          {llamastack_url.rstrip('/')}/v1/responses\", json=payload)\n        resp.raise_for_status()\n\
          \        data = resp.json()\n\n    answer = \"\"\n    for item in data.get(\"\
          output\", []):\n        if item.get(\"type\") == \"message\":\n        \
          \    for c in item.get(\"content\", []):\n                text = c.get(\"\
          text\", \"\")\n                if \"</think>\" in text:\n              \
          \      text = text.split(\"</think>\")[-1].strip()\n                answer\
          \ = text\n\n    return json.dumps({\n        \"response_id\": data.get(\"\
          id\", \"\"),\n        \"answer\": answer,\n        \"latency_ms\": round((time.monotonic()\
          \ - start) * 1000),\n    })\n\n"
        image: registry.access.redhat.com/ubi9/python-311:latest
